<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Clothing Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #222;
            color: white;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            border-radius: 8px;
        }

        .price {
            color: green;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background-color: #000;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

<h1>My Clothing Collection</h1>

<div class="container">

    <div class="product">
        <img src="maxxie.jpg" alt="Maxxie Dress">
        <h3>Maxxie</h3>
        <p class="price">Rs 5000</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="sarri.jpg" alt="Sarri Dress">
        <h3>Sarri</h3>
        <p class="price">Rs 4500</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="shararrah.jpg" alt="Shararrah Dress">
        <h3>Shararrah</h3>
        <p class="price">Rs 6500</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="frock.jpg" alt="Frock Dress">
        <h3>Frock</h3>
        <p class="price">Rs 4300</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="product5.jpg" alt="Product 5">
        <h3>Premium Outfit</h3>
        <p class="price">Rs 6700</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
